<template>
    <lightning-card icon-name="standard:account" title="Componente Hijo">
        <div class="sldslds-p-around_medium">
            <template if:true={existeCuenta} >
                <p><strong>Nombre:</strong> {account.Name}</p>
                <p><strong>Teléfono:</strong> {account.Phone}</p>
                <p><strong>Industria:</strong> {account.Industry}</p>
                <p><strong>Calle de facturación:</strong> {account.BillingStreet}</p>
                

                <div class="slds-m-top-medium">
                    <lightning-button 
                    variant="brand"
                    label="confirmar seleccion" 
                    onclick={handleClick} 
                    ></lightning-button>
                </div>
            </template>

            <template if:false={existeCuenta}>
                <p>No se ha seleccionado ninguna cuenta.</p>
            </template>
        </div>
    </lightning-card>
</template>
