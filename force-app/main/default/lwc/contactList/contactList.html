<template>
    <lightning-card>
        <template if:true={contacts}>
            <lightning-datatable
                key-field="Id"
                data={contacts}
                columns={columns}
            >
           </lightning-datatable>
        </template>
        <template if:true={errors}>
            <p>Errors: {errors}</p>
        </template>
    </lightning-card>
</template>
