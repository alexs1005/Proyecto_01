<template>
    <lightning-card icon-name="standard:account" title="Select de cuentas">
      <div class="slds-p-around_medium">
        <template if:true={errorMessage}>
            <p class="slds-text-color_error">{errorMessage}</p>
        </template>

        <lightning-combobox
          name="accountSelector"
          label="Seleccione una cuenta"
          value={selectedAccountId}
          placeholder="Seleccione una cuentas"
          options={accountOptions}
          onchange={handleAccountChange} 
        ></lightning-combobox>

        <template if:true={selectedCaseMessage}>
            <div class="slds-m-top_medium" >
                <p>{selectedCaseMessage}</p>
            </div>
        </template>

        <div class="slds-m-top_large">
            <c-bc-lista-casos-hijo 
                account-id={selectedAccountId}
                oncaseselected={handleCaseSelected}
            ></c-bc-lista-casos-hijo>
        </div>

      </div>
    </lightning-card>
</template>
