<template>
  <lightning-card
    icon-name="standard:contact"
    title="Busqueda de contactos">

    <div class="slds-p-around_medium">

      <lightning-input
        type="search"
        label="Buscar contacto por el nombre"
        value={searchKey}
        onchange={handleOnChange}>
      </lightning-input>

      <template if:true={contacts.length}>
        <lightning-datatable
          key-field="Id"
          data={contacts}
          columns={columns}
          hide-checkbox-column>
        </lightning-datatable>
      </template>
    </div>

    <template if:false={contacts.length}>
      <p class="slds-m-top_medium slds-text-color_weak">
        No results
      </p>
    </template>
  </lightning-card>
</template>
