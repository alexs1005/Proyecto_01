<template>
    <lightning-card icon-name="standard:account" variant="base" title="Oportunidades de la cuenta">
        <div class="slds-p-around_medium">

            <template if:false={hasAccountId}>
                <p>No existen cuentas.</p>
            </template>

            <template if:true={errorMessage}>
                <p class="slds-text-color_error">{errorMessage}</p>
            </template>

            <template if:true={hasAccountId}>
                <template if:true={hasOpportunities}>
                    <lightning-datatable
                        key-field="Id"
                        data={opportunities}
                        columns={columns}
                        max-row-selection="1"
                        onrowselection={handleRowSelection}>
                    </lightning-datatable>
                </template>

                <template if:false={hasOpportunities}>
                    <p>No hay oportunidades disponibles para esta cuenta.</p>
                </template>
            </template>

        </div>
    </lightning-card>
</template>
